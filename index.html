<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>RecallLab Mobile</title>

<style>
  *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%;overscroll-behavior:none}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#0a0a0b;color:#e4e4e7;
    -webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    min-height:100vh;min-height:100dvh;
    display:flex;flex-direction:column;
    user-select:none;-webkit-user-select:none;
  }
  button{font-family:inherit;cursor:pointer}
  input,textarea,select{font-family:inherit}

  .app-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#18181b;border-bottom:1px solid #27272a;position:sticky;top:0;z-index:10}
  .app-title{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
  .app-title-emoji{font-size:20px}
  .sync-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:20px;background:#27272a;font-size:11px;font-weight:600;color:#a1a1aa;border:1px solid #3f3f46}
  .sync-chip.ok{background:rgba(34,197,94,0.1);color:#86efac;border-color:rgba(34,197,94,0.3)}
  .sync-chip.warn{background:rgba(245,158,11,0.1);color:#fcd34d;border-color:rgba(245,158,11,0.3)}
  .sync-chip.error{background:rgba(239,68,68,0.1);color:#fca5a5;border-color:rgba(239,68,68,0.3)}
  .sync-chip.syncing{background:rgba(59,130,246,0.1);color:#93c5fd;border-color:rgba(59,130,246,0.3)}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .sync-chip.syncing .sync-dot{animation:pulse 1.5s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  .main{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}

  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
  .stat-card{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:12px 8px;text-align:center}
  .stat-value{font-size:22px;font-weight:800;line-height:1}
  .stat-label{font-size:10px;color:#71717a;margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}
  .stat-due .stat-value{color:#f59e0b}
  .stat-new .stat-value{color:#3b82f6}
  .stat-streak .stat-value{color:#ef4444}

  .section-title{font-size:13px;font-weight:700;color:#a1a1aa;text-transform:uppercase;letter-spacing:0.5px;margin:16px 0 8px;padding:0 4px}
  .deck-card{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.15s}
  .deck-card:active{transform:scale(0.98);background:#27272a}
  .deck-icon{font-size:24px;flex-shrink:0}
  .deck-info{flex:1;min-width:0}
  .deck-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .deck-meta{font-size:11px;color:#71717a;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
  .deck-meta .pill{padding:1px 8px;border-radius:10px;background:#27272a;font-weight:600}
  .deck-meta .pill.due{background:rgba(245,158,11,0.15);color:#fbbf24}
  .deck-meta .pill.new{background:rgba(59,130,246,0.15);color:#93c5fd}
  .deck-arrow{color:#52525b;font-size:18px}

  .empty{text-align:center;padding:60px 20px;color:#71717a}
  .empty-emoji{font-size:48px;margin-bottom:12px}
  .empty-text{font-size:14px;line-height:1.5}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:10px;font-size:14px;font-weight:600;background:#27272a;color:#e4e4e7;transition:all 0.15s}
  .btn:active{transform:scale(0.96)}
  .btn-primary{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
  .btn-block{width:100%}
  .btn-lg{padding:16px 24px;font-size:16px}
  .btn-ghost{background:transparent;color:#a1a1aa}

  .review-screen{position:fixed;inset:0;background:#0a0a0b;z-index:100;display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
  .review-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#18181b;border-bottom:1px solid #27272a}
  .review-back{background:none;border:none;color:#a1a1aa;font-size:14px;padding:8px 12px;border-radius:8px}
  .review-progress{flex:1;text-align:center;font-size:13px;color:#a1a1aa;font-weight:600}
  .review-counter{background:#27272a;padding:4px 10px;border-radius:10px;font-size:12px;display:inline-flex;align-items:center;gap:6px}
  .progress-bar{height:3px;background:#27272a;position:relative}
  .progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width 0.3s}

  .card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:24px 20px;cursor:pointer;overflow-y:auto}
  .card-content{width:100%;max-width:500px;background:#18181b;border:1px solid #27272a;border-radius:16px;padding:24px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.3)}
  .card-side-label{font-size:10px;color:#71717a;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-weight:700}
  .card-text{font-size:18px;line-height:1.5;font-weight:500;word-wrap:break-word;white-space:pre-wrap}
  .card-divider{height:1px;background:#27272a;margin:20px 0}
  .card-back-text{font-size:18px;line-height:1.5;color:#a5f3fc;font-weight:500;word-wrap:break-word;white-space:pre-wrap}
  .tap-hint{font-size:11px;color:#52525b;text-align:center;margin-top:16px}

  .rate-buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:12px 12px calc(12px + env(safe-area-inset-bottom));background:#18181b;border-top:1px solid #27272a}
  .rate-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:14px 4px;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:13px}
  .rate-btn:active{transform:scale(0.95)}
  .rate-btn .interval{font-size:10px;font-weight:500;opacity:0.85}
  .rate-again{background:#dc2626}
  .rate-hard{background:#ea580c}
  .rate-good{background:#16a34a}
  .rate-easy{background:#0891b2}

  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(100px);background:#18181b;border:1px solid #27272a;border-radius:12px;padding:10px 18px;font-size:13px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,0.5);z-index:200;opacity:0;transition:all 0.3s;max-width:90%}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.ok{border-color:#22c55e;color:#86efac}
  .toast.warn{border-color:#f59e0b;color:#fcd34d}
  .toast.err{border-color:#ef4444;color:#fca5a5}
  .toast.info{border-color:#3b82f6;color:#93c5fd}

  .loading-overlay{position:fixed;inset:0;background:rgba(10,10,11,0.95);z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .spinner{width:40px;height:40px;border:3px solid #27272a;border-top-color:#6366f1;border-radius:50%;animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{margin-top:16px;color:#a1a1aa;font-size:13px}

  .done-screen{padding:40px 20px;text-align:center}
  .done-emoji{font-size:80px;margin-bottom:20px}
  .done-title{font-size:24px;font-weight:800;margin-bottom:8px}
  .done-stats{color:#a1a1aa;margin-bottom:24px;font-size:14px}

  .sheet{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:150;display:flex;align-items:flex-end;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.2s}
  .sheet.open{opacity:1;pointer-events:auto}
  .sheet-content{width:100%;background:#18181b;border-top-left-radius:20px;border-top-right-radius:20px;padding:20px 20px calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform 0.25s;max-height:85vh;overflow-y:auto}
  .sheet.open .sheet-content{transform:translateY(0)}
  .sheet-handle{width:40px;height:4px;background:#3f3f46;border-radius:2px;margin:-8px auto 16px}
  .sheet-title{font-size:18px;font-weight:700;margin-bottom:16px}
  .setting-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-top:1px solid #27272a;font-size:14px;gap:8px}
  .setting-row:first-of-type{border-top:0}
  .setting-label{color:#a1a1aa;flex:1}
  .setting-value{font-weight:600;text-align:right;word-break:break-all}

  .cloze-hidden{background:rgba(59,130,246,0.15);color:#3b82f6;padding:2px 8px;border-radius:4px;font-weight:600;border:1px dashed rgba(59,130,246,0.4)}
  .cloze-revealed{color:#22c55e;font-weight:700;text-decoration:underline}

  /* Setup-Screen */
  .setup-screen{padding:40px 24px;max-width:500px;margin:0 auto}
  .setup-screen h2{margin:0 0 12px;font-size:22px}
  .setup-screen p{color:#a1a1aa;font-size:13px;line-height:1.5;margin-bottom:18px}
  .setup-input{width:100%;padding:12px 14px;background:#27272a;border:1px solid #3f3f46;border-radius:10px;color:#fff;font-size:14px;font-family:monospace;margin-bottom:8px}
  .setup-help{font-size:11px;color:#71717a;margin-bottom:14px}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">
    <span class="app-title-emoji">📚</span>
    <span>RecallLab</span>
  </div>
  <div class="sync-chip" id="syncChip">
    <span class="sync-dot"></span>
    <span id="syncStatus">Lädt...</span>
  </div>
</header>

<main class="main" id="mainView"></main>

<div class="review-screen" id="reviewScreen" style="display:none">
  <div class="review-header">
    <button class="review-back" id="reviewBackBtn">← Beenden</button>
    <div class="review-progress" id="reviewProgress"></div>
    <div style="width:80px"></div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="card-area" id="cardArea">
    <div class="card-content" id="cardContent"></div>
  </div>
  <div class="rate-buttons" id="rateButtons" style="display:none">
    <button class="rate-btn rate-again" data-rating="again"><span>Nochmal</span><span class="interval" id="intAgain">&lt;1m</span></button>
    <button class="rate-btn rate-hard" data-rating="hard"><span>Schwer</span><span class="interval" id="intHard">10m</span></button>
    <button class="rate-btn rate-good" data-rating="good"><span>Gut</span><span class="interval" id="intGood">1d</span></button>
    <button class="rate-btn rate-easy" data-rating="easy"><span>Leicht</span><span class="interval" id="intEasy">4d</span></button>
  </div>
</div>

<div class="sheet" id="settingsSheet">
  <div class="sheet-content">
    <div class="sheet-handle"></div>
    <div class="sheet-title">⚙️ Einstellungen</div>
    <div class="setting-row">
      <span class="setting-label">Karten neu / Tag</span>
      <input type="number" id="settingNewPerDay" style="width:80px;padding:8px;background:#27272a;border:1px solid #3f3f46;border-radius:8px;color:#fff;font-weight:600;text-align:right" />
    </div>
    <div class="setting-row">
      <span class="setting-label">Karten Wdh. / Tag</span>
      <input type="number" id="settingReviewPerDay" style="width:80px;padding:8px;background:#27272a;border:1px solid #3f3f46;border-radius:8px;color:#fff;font-weight:600;text-align:right" />
    </div>
    <div class="setting-row">
      <span class="setting-label">Letzter Sync</span>
      <span class="setting-value" id="settingLastSync">—</span>
    </div>
    <div class="setting-row">
      <span class="setting-label">Geräte-ID</span>
      <span class="setting-value" id="settingDeviceId" style="font-family:monospace;font-size:11px">—</span>
    </div>
    <div class="setting-row">
      <span class="setting-label">Lokale Karten</span>
      <span class="setting-value" id="settingCardCount">—</span>
    </div>
    <div class="setting-row">
      <span class="setting-label">Pendente Reviews</span>
      <span class="setting-value" id="settingPendingReviews">—</span>
    </div>
    <div class="setting-row">
      <span class="setting-label">API-Endpoint</span>
      <span class="setting-value" id="settingEndpoint" style="font-family:monospace;font-size:10px">—</span>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:20px">
      <button class="btn btn-primary btn-block" id="btnForceSync">🔄 Jetzt synchronisieren</button>
      <button class="btn btn-block" id="btnPushNow">📤 Reviews jetzt hochladen</button>
      <button class="btn btn-block" id="btnPullNow">📥 Vom Cloud neu laden</button>
      <button class="btn btn-block" id="btnReconfig">🔐 Auth-Token ändern</button>
      <button class="btn btn-ghost btn-block" id="btnCloseSettings">Schließen</button>
    </div>
    <div style="text-align:center;font-size:11px;color:#52525b;margin-top:16px">
      RecallLab Mobile v2.0 · Netlify Blobs Sync
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Lade Daten…</div>
</div>

<script>
// ============================================================================
// CONFIGURATION
// ============================================================================
// Hardcoded URL der Netlify-Site, auf der die Management-App + Blob-Functions laufen.
// Die Mobile-App selbst liegt auf einer anderen Netlify-Site (recalllab-mobile),
// also gehen die Requests cross-origin — die Functions setzen CORS: *.
const HARDCODED_BASE_URL = "https://management-xo2-pro.netlify.app";

const APP_DATA_KEY = "app-data.json";
const MOBILE_DELTA_KEY = "recalllab-mobile.json";
const LOCAL_RL_KEY = "recalllab-mobile-local";
const LOCAL_PENDING_KEY = "recalllab-mobile-pending-reviews";
const DEVICE_ID_KEY = "recalllab-mobile-device-id";
const SETTINGS_KEY = "recalllab-mobile-settings";
const META_KEY = "recalllab-mobile-meta";
const AUTH_TOKEN_KEY = "recalllab-mobile-auth-token";

const state = {
  rl: null,
  pendingReviews: [],
  meta: { lastPullAt: null, lastPushAt: null, lastDataTimestamp: 0 },
  syncStatus: "idle",
  reviewQueue: [],
  reviewIndex: 0,
  reviewStartCount: 0,
  answerRevealed: false,
  reviewSessionRated: 0,
  config: { baseUrl: HARDCODED_BASE_URL, authToken: "" },
};

function $(id) { return document.getElementById(id); }
function esc(s) { return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]); }

function getDeviceId() {
  let id = localStorage.getItem(DEVICE_ID_KEY);
  if (!id) {
    id = "mobile_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8);
    localStorage.setItem(DEVICE_ID_KEY, id);
  }
  return id;
}

function loadConfig() {
  // URL ist hardcoded, nur Auth-Token kommt aus localStorage
  try {
    const token = localStorage.getItem(AUTH_TOKEN_KEY) || "";
    state.config = { baseUrl: HARDCODED_BASE_URL, authToken: token };
  } catch(e) {
    state.config = { baseUrl: HARDCODED_BASE_URL, authToken: "" };
  }
  return true;
}

function saveAuthToken(token) {
  state.config.authToken = token || "";
  if (token) localStorage.setItem(AUTH_TOKEN_KEY, token);
  else localStorage.removeItem(AUTH_TOKEN_KEY);
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(LOCAL_RL_KEY);
    state.rl = raw ? JSON.parse(raw) : null;
  } catch(e) { state.rl = null; }
  try {
    const p = localStorage.getItem(LOCAL_PENDING_KEY);
    state.pendingReviews = p ? JSON.parse(p) : [];
  } catch(e) { state.pendingReviews = []; }
  try {
    const m = localStorage.getItem(META_KEY);
    state.meta = m ? JSON.parse(m) : state.meta;
  } catch(e) {}
}

function saveLocal() {
  try {
    if (state.rl) localStorage.setItem(LOCAL_RL_KEY, JSON.stringify(state.rl));
    localStorage.setItem(LOCAL_PENDING_KEY, JSON.stringify(state.pendingReviews));
    localStorage.setItem(META_KEY, JSON.stringify(state.meta));
  } catch(e) { console.warn("Save failed", e); }
}

function getSettings() {
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || "null");
    return s || { newCardsPerDay: 20, reviewCardsPerDay: 100 };
  } catch { return { newCardsPerDay: 20, reviewCardsPerDay: 100 }; }
}
function saveSettings(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}

function toast(msg, kind = "info", duration = 2500) {
  const existing = document.querySelector(".toast");
  if (existing) existing.remove();
  const t = document.createElement("div");
  t.className = "toast " + kind;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add("show"), 10);
  setTimeout(() => {
    t.classList.remove("show");
    setTimeout(() => t.remove(), 300);
  }, duration);
}

function setLoading(visible, text = "Lade…") {
  $("loadingOverlay").style.display = visible ? "flex" : "none";
  if (visible) $("loadingText").textContent = text;
}

function updateSyncChip(status, msg) {
  state.syncStatus = status;
  const chip = $("syncChip");
  const txt = $("syncStatus");
  chip.className = "sync-chip " + (status === "ok" ? "ok" : status === "error" ? "error" : status === "syncing" ? "syncing" : status === "warn" ? "warn" : "");
  txt.textContent = msg || (status === "ok" ? "Synchron" : status === "error" ? "Fehler" : status === "syncing" ? "Sync…" : status === "offline" ? "Offline" : "Bereit");
}

// ============================================================================
// NETLIFY BLOBS API
// ============================================================================
async function blobGet(key) {
  if (!state.config?.baseUrl) throw new Error("Endpoint nicht konfiguriert");
  const baseUrl = state.config.baseUrl.replace(/\/$/, "");
  const url = baseUrl + "/.netlify/functions/blob-get?key=" + encodeURIComponent(key) + "&_ts=" + Date.now();
  const headers = { "Cache-Control": "no-cache" };
  if (state.config.authToken) headers["Authorization"] = "Bearer " + state.config.authToken;
  const resp = await fetch(url, { headers });
  if (resp.status === 404) {
    return { ok: false, status: 404 };
  }
  if (!resp.ok) {
    throw new Error("HTTP " + resp.status + (resp.status === 401 ? " — Auth-Token falsch" : ""));
  }
  const data = await resp.json();
  return { ok: true, data };
}

async function blobPut(key, data) {
  if (!state.config?.baseUrl) throw new Error("Endpoint nicht konfiguriert");
  const baseUrl = state.config.baseUrl.replace(/\/$/, "");
  const url = baseUrl + "/.netlify/functions/blob-put?key=" + encodeURIComponent(key);
  const headers = { "Content-Type": "application/json" };
  if (state.config.authToken) headers["Authorization"] = "Bearer " + state.config.authToken;
  const resp = await fetch(url, { method: "PUT", headers, body: JSON.stringify(data) });
  if (!resp.ok) {
    throw new Error("HTTP " + resp.status + (resp.status === 401 ? " — Auth-Token falsch" : ""));
  }
  return { ok: true };
}

function getDataTimestamp(data) {
  if (!data) return 0;
  if (data.meta?.updatedAt) return new Date(data.meta.updatedAt).getTime();
  if (data.updatedAt) return new Date(data.updatedAt).getTime();
  return 0;
}

// ============================================================================
// PULL: lade frische Karten + SRS-Daten von Cloud
// ============================================================================
async function pull(opts = {}) {
  const { silent = false } = opts;
  if (!state.config?.baseUrl) {
    updateSyncChip("error", "Nicht konfiguriert");
    if (!silent) toast("Endpoint fehlt", "err");
    return false;
  }
  updateSyncChip("syncing", "Pull…");
  if (!silent) setLoading(true, "Lade frische Daten…");
  try {
    const result = await blobGet(APP_DATA_KEY);
    if (!result.ok) {
      // 404 = Haupt-App hat noch nichts gepusht — kein Fehler, freundliche Nachricht
      if (result.status === 404) {
        updateSyncChip("warn", "Keine Cloud-Daten");
        if (!silent) toast("Cloud ist leer — push erst von der Haupt-App", "warn", 5000);
        return false;
      }
      throw new Error("HTTP " + (result.status || "?"));
    }
    const cloudData = result.data;
    if (!cloudData || !cloudData.recallLabData) {
      // App-Daten sind da, aber kein recallLabData drin
      updateSyncChip("warn", "Keine Karten");
      if (!silent) toast("Haupt-App hat noch keine RecallLab-Karten", "warn", 5000);
      return false;
    }
    const cloudRL = cloudData.recallLabData;
    const cloudTs = getDataTimestamp(cloudData);
    if (!state.rl) {
      state.rl = cloudRL;
    } else {
      state.rl = mergeCloudIntoLocal(cloudRL, state.rl, state.pendingReviews);
    }
    state.meta.lastPullAt = new Date().toISOString();
    state.meta.lastDataTimestamp = cloudTs;
    saveLocal();
    updateSyncChip("ok", "Synchron");
    if (!silent) {
      const cardCount = (state.rl.cards || []).length;
      toast(`✓ ${cardCount} Karten geladen`, "ok");
    }
    return true;
  } catch(e) {
    console.error("Pull failed", e);
    const msg = String(e?.message || "Unbekannt");
    
    // Spezifischere Status-Behandlung
    if (/401|Unauth/i.test(msg)) {
      updateSyncChip("error", "Auth-Fehler");
      if (!silent) toast("Auth-Token falsch", "err", 4000);
      setTimeout(() => renderAuthTokenPrompt(), 400);
    } else if (/404/.test(msg)) {
      updateSyncChip("warn", "Function fehlt");
      if (!silent) toast("Function nicht deployed (404)", "err", 5000);
    } else if (/500/.test(msg)) {
      updateSyncChip("error", "Server-Fehler");
      if (!silent) toast("Netlify-Function-Fehler (500). Logs prüfen.", "err", 5000);
    } else if (/NetworkError|Failed to fetch|TypeError/i.test(msg)) {
      updateSyncChip("error", "Offline?");
      if (!silent) toast("Keine Verbindung zu " + state.config.baseUrl.replace(/^https?:\/\//,""), "err", 5000);
    } else {
      updateSyncChip("error", "Pull-Fehler");
      if (!silent) toast("Pull: " + msg, "err", 5000);
    }
    return false;
  } finally {
    if (!silent) setLoading(false);
  }
}

function mergeCloudIntoLocal(cloudRL, localRL, pendingReviews) {
  const merged = JSON.parse(JSON.stringify(cloudRL || {}));
  if (!Array.isArray(merged.cards)) merged.cards = [];
  if (!Array.isArray(merged.decks)) merged.decks = [];
  if (!Array.isArray(merged.reviewLogs)) merged.reviewLogs = [];
  const pendingCardIds = new Set((pendingReviews || []).map(r => r.cardId));
  const localCardMap = new Map((localRL?.cards || []).map(c => [c.id, c]));
  merged.cards = merged.cards.map(c => {
    if (pendingCardIds.has(c.id)) {
      const localC = localCardMap.get(c.id);
      if (localC && localC.srs) {
        return { ...c, srs: localC.srs, suspended: localC.suspended || c.suspended, leech: localC.leech || c.leech };
      }
    }
    return c;
  });
  merged.user = merged.user || { xp: 0, level: 1, streak: 0 };
  if (localRL?.user) {
    merged.user.xp = Math.max(merged.user.xp || 0, localRL.user.xp || 0);
    merged.user.level = Math.max(merged.user.level || 1, localRL.user.level || 1);
    merged.user.streak = Math.max(merged.user.streak || 0, localRL.user.streak || 0);
    if (localRL.user.lastStudyDate && (!merged.user.lastStudyDate || new Date(localRL.user.lastStudyDate) > new Date(merged.user.lastStudyDate))) {
      merged.user.lastStudyDate = localRL.user.lastStudyDate;
    }
  }
  return merged;
}

// ============================================================================
// PUSH: Mobile-Reviews als Delta hochladen
// ============================================================================
async function push(opts = {}) {
  const { silent = false } = opts;
  if (!state.config?.baseUrl) {
    updateSyncChip("error", "Nicht konfiguriert");
    if (!silent) toast("Endpoint fehlt", "err");
    return false;
  }
  if (state.pendingReviews.length === 0) {
    if (!silent) toast("Keine ungesendeten Reviews", "info");
    return true;
  }
  updateSyncChip("syncing", "Push…");
  if (!silent) setLoading(true, "Lade Reviews hoch…");
  try {
    let existingDelta = null;
    try {
      const r = await blobGet(MOBILE_DELTA_KEY);
      if (r.ok) existingDelta = r.data;
    } catch(e) { /* OK if not exist */ }
    
    const deviceId = getDeviceId();
    const allReviews = [];
    if (existingDelta && Array.isArray(existingDelta.reviews) && !existingDelta.consumedAt) {
      existingDelta.reviews.forEach(r => {
        if (r.deviceId !== deviceId) allReviews.push(r);
      });
    }
    state.pendingReviews.forEach(r => {
      allReviews.push({ ...r, deviceId });
    });
    const payload = {
      type: "recalllab-mobile-delta",
      deviceId: deviceId,
      generatedAt: new Date().toISOString(),
      reviews: allReviews,
      user: state.rl?.user ? {
        xp: state.rl.user.xp,
        level: state.rl.user.level,
        streak: state.rl.user.streak,
        lastStudyDate: state.rl.user.lastStudyDate
      } : null,
    };
    await blobPut(MOBILE_DELTA_KEY, payload);
    state.pendingReviews = [];
    state.meta.lastPushAt = new Date().toISOString();
    saveLocal();
    updateSyncChip("ok", "Hochgeladen");
    if (!silent) toast(`✓ Hochgeladen`, "ok");
    return true;
  } catch(e) {
    console.error("Push failed", e);
    updateSyncChip("error", "Push-Fehler");
    if (!silent) toast("Push fehlgeschlagen: " + (e.message || "Unbekannt"), "err");
    if (e && /401|Unauth/i.test(String(e.message || ""))) {
      setTimeout(() => renderAuthTokenPrompt(), 200);
    }
    return false;
  } finally {
    if (!silent) setLoading(false);
  }
}

// ============================================================================
// SRS ALGORITHM (identisch zur Haupt-App)
// ============================================================================
const LEARN_STEPS = [1, 10];
const RELEARN_STEPS = [10];

function calculateSRS(card, rating) {
  const srs = card.srs || { ease: 2.5, intervalDays: 0, repetitions: 0, nextReview: Date.now(), phase: "new", step: 0, lapses: 0 };
  let { ease, intervalDays, repetitions, lapses } = srs;
  let phase = srs.phase || (repetitions > 0 ? "review" : "new");
  let step = srs.step || 0;
  if (phase === "new" || phase === "learning") {
    if (rating === "again") { step = 0; phase = "learning"; }
    else if (rating === "hard") { phase = "learning"; }
    else if (rating === "good") { step++; if (step >= LEARN_STEPS.length) { phase = "review"; intervalDays = 1; repetitions = 1; } else phase = "learning"; }
    else if (rating === "easy") { phase = "review"; intervalDays = 4; repetitions = 1; ease += 0.15; }
    if (phase === "learning") { const m = LEARN_STEPS[step] || 1; return { ease, intervalDays: m/(24*60), repetitions, nextReview: Date.now()+m*60000, phase, step, lapses }; }
  } else if (phase === "relearning") {
    if (rating === "again") step = 0;
    else if (rating === "good" || rating === "hard") { step++; if (step >= RELEARN_STEPS.length) { phase = "review"; intervalDays = Math.max(1, intervalDays * 0.5); } }
    else if (rating === "easy") { phase = "review"; intervalDays = Math.max(1, intervalDays); }
    if (phase === "relearning") { const m = RELEARN_STEPS[step] || 10; return { ease, intervalDays, repetitions, nextReview: Date.now()+m*60000, phase, step, lapses }; }
  } else {
    if (rating === "again") { lapses++; phase = "relearning"; step = 0; ease = Math.max(1.3, ease-0.2); const m = RELEARN_STEPS[0] || 10; return { ease, intervalDays, repetitions, nextReview: Date.now()+m*60000, phase, step, lapses, isLeech: lapses >= 8 }; }
    else if (rating === "hard") { intervalDays = Math.max(1, intervalDays*1.2); ease = Math.max(1.3, ease-0.15); }
    else if (rating === "good") { intervalDays = repetitions <= 1 ? 1 : repetitions === 2 ? 6 : intervalDays * ease; repetitions++; }
    else if (rating === "easy") { intervalDays = repetitions <= 1 ? 4 : intervalDays * ease * 1.3; repetitions++; ease += 0.15; }
  }
  const fuzz = 1 + (Math.random() * 0.1 - 0.05);
  intervalDays = Math.round(intervalDays * fuzz * 10) / 10;
  return { ease, intervalDays, repetitions, nextReview: Date.now() + intervalDays * 86400000, phase: "review", step: 0, lapses: lapses || 0 };
}

function getIntervalPreview(card, rating) {
  const p = calculateSRS(JSON.parse(JSON.stringify(card)), rating);
  if (p.phase === "learning" || p.phase === "relearning") {
    const m = Math.round((p.nextReview - Date.now()) / 60000);
    return m < 60 ? m + "m" : Math.round(m/60) + "h";
  }
  const d = Math.round(p.intervalDays);
  return d < 1 ? "<1d" : d < 30 ? d + "d" : d < 365 ? Math.round(d/30) + "mo" : (d/365).toFixed(1) + "y";
}

const isNew = c => !c.srs || (!c.srs.repetitions && c.srs.phase !== "learning");
const isLearning = c => c.srs && (c.srs.phase === "learning" || c.srs.phase === "relearning");
const isLearningDue = c => isLearning(c) && c.srs.nextReview <= Date.now();
const isDue = c => c.srs && c.srs.nextReview <= Date.now() && c.srs.repetitions > 0 && c.srs.phase === "review";

function getDeckCards(deckId) {
  return (state.rl?.cards || []).filter(c => c.deckId === deckId && !c.suspended);
}

function getDeckStats(deckId) {
  const cards = getDeckCards(deckId);
  return {
    total: cards.length,
    due: cards.filter(c => isDue(c) || isLearningDue(c)).length,
    new: cards.filter(c => isNew(c)).length,
    learning: cards.filter(c => isLearning(c)).length,
  };
}

function renderCloze(text, reveal) {
  if (!text) return "";
  return esc(text).replace(/\{\{c(\d+)::([^}]+?)(?:::([^}]+?))?\}\}/g, (m, n, ans, hint) =>
    reveal 
      ? `<span class="cloze-revealed">${esc(ans)}</span>`
      : `<span class="cloze-hidden">${esc(hint || '[...]')}</span>`
  );
}

// ============================================================================
// REVIEW (unverändert, nur die Sync-Aufrufe gehen jetzt über blobPut)
// ============================================================================
function startReview(deckId) {
  if (!state.rl || !state.rl.cards) { toast("Erst synchronisieren", "warn"); return; }
  const settings = getSettings();
  const cards = deckId 
    ? (state.rl.cards || []).filter(c => c.deckId === deckId && !c.suspended)
    : (state.rl.cards || []).filter(c => !c.suspended);
  const dueCards = cards.filter(c => isDue(c) || isLearningDue(c));
  const newCards = cards.filter(c => isNew(c));
  const queue = [
    ...dueCards.slice(0, settings.reviewCardsPerDay),
    ...newCards.slice(0, settings.newCardsPerDay)
  ];
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
  if (queue.length === 0) { toast("Keine fälligen Karten", "info"); return; }
  state.reviewQueue = queue;
  state.reviewIndex = 0;
  state.reviewStartCount = queue.length;
  state.reviewSessionRated = 0;
  state.answerRevealed = false;
  $("reviewScreen").style.display = "flex";
  showReviewCard();
}

function showReviewCard() {
  $("reviewProgress").innerHTML = `<span class="review-counter">${state.reviewSessionRated} / ${state.reviewStartCount}</span>`;
  const pct = state.reviewStartCount > 0 ? (state.reviewSessionRated / state.reviewStartCount) * 100 : 0;
  $("progressFill").style.width = pct + "%";
  while (state.reviewIndex < state.reviewQueue.length) {
    const c = state.reviewQueue[state.reviewIndex];
    if (c.srs && c.srs.phase === "learning" && c.srs.nextReview > Date.now()) {
      state.reviewQueue.push(c);
      state.reviewQueue.splice(state.reviewIndex, 1);
      if (state.reviewQueue.every(card => card.srs?.phase === "learning" && card.srs.nextReview > Date.now())) {
        const nextCard = state.reviewQueue.reduce((min, x) => x.srs.nextReview < min.srs.nextReview ? x : min);
        const waitMs = nextCard.srs.nextReview - Date.now();
        const waitSec = Math.ceil(waitMs / 1000);
        $("cardContent").innerHTML = `
          <div style="text-align:center;padding:30px 10px">
            <div style="font-size:48px;margin-bottom:16px">⏰</div>
            <div style="font-size:16px;color:#a1a1aa;margin-bottom:8px">Nächste Karte in ${waitSec}s</div>
            <div style="font-size:11px;color:#52525b">Lernkarten brauchen Pause</div>
          </div>`;
        $("rateButtons").style.display = "none";
        setTimeout(() => showReviewCard(), Math.max(1000, waitMs));
        return;
      }
      continue;
    }
    break;
  }
  if (state.reviewIndex >= state.reviewQueue.length) { finishReview(); return; }
  const card = state.reviewQueue[state.reviewIndex];
  state.answerRevealed = false;
  const isCloze = card.cardType === "cloze" || /\{\{c\d+::/.test(card.front || "");
  const cardHtml = `
    <div class="card-side-label">Frage</div>
    <div class="card-text">${isCloze ? renderCloze(card.front, false) : esc(card.front || "")}</div>
    <div class="tap-hint">Tippe zum Aufdecken</div>
  `;
  $("cardContent").innerHTML = cardHtml;
  $("cardContent").dataset.cardId = card.id;
  $("rateButtons").style.display = "none";
}

function revealAnswer() {
  if (state.answerRevealed) return;
  state.answerRevealed = true;
  const card = state.reviewQueue[state.reviewIndex];
  if (!card) return;
  const isCloze = card.cardType === "cloze" || /\{\{c\d+::/.test(card.front || "");
  let cardHtml;
  if (isCloze) {
    cardHtml = `
      <div class="card-side-label">Antwort</div>
      <div class="card-text">${renderCloze(card.front, true)}</div>
      ${card.back ? '<div class="card-divider"></div><div class="card-back-text">' + esc(card.back) + '</div>' : ''}
    `;
  } else {
    cardHtml = `
      <div class="card-side-label">Frage</div>
      <div class="card-text">${esc(card.front || "")}</div>
      <div class="card-divider"></div>
      <div class="card-side-label" style="color:#a5f3fc">Antwort</div>
      <div class="card-back-text">${esc(card.back || "")}</div>
    `;
  }
  $("cardContent").innerHTML = cardHtml;
  $("intAgain").textContent = getIntervalPreview(card, "again");
  $("intHard").textContent = getIntervalPreview(card, "hard");
  $("intGood").textContent = getIntervalPreview(card, "good");
  $("intEasy").textContent = getIntervalPreview(card, "easy");
  $("rateButtons").style.display = "grid";
}

function rateCard(rating) {
  const card = state.reviewQueue[state.reviewIndex];
  if (!card) return;
  const newSrs = calculateSRS(card, rating);
  const ts = Date.now();
  card.srs = newSrs;
  if (newSrs.isLeech) { card.suspended = true; card.leech = true; toast("⚠️ Leech! Karte ausgesetzt.", "warn"); }
  state.pendingReviews.push({ cardId: card.id, rating, ts, srs: { ...newSrs } });
  if (!Array.isArray(state.rl.reviewLogs)) state.rl.reviewLogs = [];
  state.rl.reviewLogs.push({ id: "log_" + ts + "_" + Math.random().toString(36).slice(2,5), cardId: card.id, rating, timestamp: ts });
  const localCard = state.rl.cards.find(c => c.id === card.id);
  if (localCard) { localCard.srs = card.srs; localCard.suspended = card.suspended; localCard.leech = card.leech; }
  const xp = { again: 1, hard: 2, good: 3, easy: 5 }[rating] || 0;
  state.rl.user = state.rl.user || { xp: 0, level: 1, streak: 0 };
  state.rl.user.xp = (state.rl.user.xp || 0) + xp;
  state.rl.user.level = Math.floor(state.rl.user.xp / 100) + 1;
  const td = new Date().toDateString();
  if (state.rl.user.lastStudyDate !== td) {
    if (state.rl.user.lastStudyDate) {
      const d = Math.floor((new Date(td) - new Date(state.rl.user.lastStudyDate)) / 86400000);
      state.rl.user.streak = d === 1 ? (state.rl.user.streak || 0) + 1 : 1;
    } else { state.rl.user.streak = 1; }
    state.rl.user.lastStudyDate = td;
  }
  state.reviewSessionRated++;
  saveLocal();
  if (state.pendingReviews.length > 0 && state.pendingReviews.length % 5 === 0) {
    push({ silent: true }).catch(e => console.warn("Auto-push failed", e));
  }
  if (newSrs.phase === "learning" || newSrs.phase === "relearning") {
    state.reviewQueue.splice(state.reviewIndex, 1);
    state.reviewQueue.push(card);
  } else { state.reviewIndex++; }
  showReviewCard();
}

async function finishReview() {
  $("cardContent").innerHTML = `
    <div class="done-screen">
      <div class="done-emoji">🎉</div>
      <div class="done-title">Geschafft!</div>
      <div class="done-stats">
        ${state.reviewSessionRated} Karten gelernt<br>
        +${state.reviewSessionRated * 3} XP geschätzt
      </div>
      <button class="btn btn-primary btn-lg btn-block" onclick="window.endReview(true)">
        ✓ Hochladen & Schließen
      </button>
      <button class="btn btn-block btn-ghost" style="margin-top:8px" onclick="window.endReview(false)">
        Später hochladen
      </button>
    </div>`;
  $("rateButtons").style.display = "none";
}

async function endReview(uploadNow) {
  if (uploadNow && state.pendingReviews.length > 0) {
    setLoading(true, "Lade Reviews hoch…");
    await push({ silent: true });
    setLoading(false);
    toast("✓ Hochgeladen", "ok");
  }
  $("reviewScreen").style.display = "none";
  state.reviewQueue = [];
  state.reviewIndex = 0;
  renderMain();
}

  $("settingPendingReviews").textContent = state.pendingReviews.length;

}

function closeSettings() {
  const s = getSettings();
  const newPerDay = parseInt($("settingNewPerDay").value) || 20;
  const revPerDay = parseInt($("settingReviewPerDay").value) || 100;
  saveSettings({ ...s, newCardsPerDay: newPerDay, reviewCardsPerDay: revPerDay });
  $("settingsSheet").classList.remove("open");
  renderMain();
}

async function forceSync() {
  const pullOk = await pull({ silent: false });
  if (pullOk && state.pendingReviews.length > 0) {
    await push({ silent: false });
  }
  renderMain();
}

window.openSettings = openSettings;
window.startReview = startReview;
window.endReview = endReview;
window.forceSync = forceSync;

window.runDiagnose = async function() {
  const out = document.getElementById('diagnoseResultMobile');
  const lines = [];
  const log = (msg) => { lines.push(msg); if (out) out.textContent = lines.join("\n"); };
  
  log("🩺 Diagnose läuft...\n");
  log("Endpoint: " + state.config.baseUrl);
  log("Auth-Token: " + (state.config.authToken ? "gesetzt (" + state.config.authToken.length + " Zeichen)" : "LEER"));
  log("");
  
  const baseUrl = state.config.baseUrl.replace(/\/$/, "");
  
  // 1. Test ob die Site überhaupt erreichbar ist
  log("1) Teste, ob Site erreichbar...");
  try {
    const r = await fetch(baseUrl + "/", { method: "HEAD", cache: "no-cache" });
    log("   ✓ Site antwortet (Status " + r.status + ")");
  } catch(e) {
    log("   ✗ Site nicht erreichbar: " + (e.message || e));
    log("\n→ Domain falsch oder offline?");
    return;
  }
  
  // 2. Test GET-Endpoint
  log("\n2) Teste GET-Endpoint...");
  try {
    const url = baseUrl + "/.netlify/functions/blob-get?key=" + encodeURIComponent(APP_DATA_KEY) + "&_ts=" + Date.now();
    const headers = {};
    if (state.config.authToken) headers["Authorization"] = "Bearer " + state.config.authToken;
    const r = await fetch(url, { headers });
    const txt = await r.text();
    log("   Status: " + r.status);
    if (r.status === 200) {
      try {
        const json = JSON.parse(txt);
        log("   ✓ JSON empfangen (" + txt.length + " Bytes)");
        log("   recallLabData? " + (json.recallLabData ? "JA (" + (json.recallLabData.cards?.length || 0) + " Karten)" : "NEIN"));
      } catch(e) {
        log("   ⚠️ Antwort ist kein JSON. Erste 200 Zeichen:");
        log("   " + txt.slice(0, 200));
      }
    } else if (r.status === 401) {
      log("   ✗ Auth-Token falsch oder fehlt");
    } else if (r.status === 404) {
      log("   ✗ 404 — Function nicht deployed ODER noch keine Daten");
      log("   (Antwort: " + txt.slice(0, 100) + ")");
    } else if (r.status === 500) {
      log("   ✗ Server-Fehler");
      log("   (Antwort: " + txt.slice(0, 200) + ")");
    } else {
      log("   ✗ Unerwarteter Status. Antwort: " + txt.slice(0, 200));
    }
  } catch(e) {
    log("   ✗ Exception: " + (e.message || e));
  }
  
  // 3. Test PUT-Endpoint
  log("\n3) Teste PUT-Endpoint...");
  try {
    const url = baseUrl + "/.netlify/functions/blob-put?key=_diagnose-mobile-test.json";
    const headers = { "Content-Type": "application/json" };
    if (state.config.authToken) headers["Authorization"] = "Bearer " + state.config.authToken;
    const r = await fetch(url, { 
      method: "PUT", 
      headers, 
      body: JSON.stringify({ test: true, ts: Date.now(), source: "mobile-diagnose" })
    });
    log("   Status: " + r.status);
    if (r.status === 200) {
      log("   ✓ PUT erfolgreich");
    } else {
      const txt = await r.text();
      log("   ✗ Antwort: " + txt.slice(0, 200));
    }
  } catch(e) {
    log("   ✗ Exception: " + (e.message || e));
  }
  
  log("\n=== Diagnose fertig ===");
  log("\nFalls 404 bei GET: lass die Haupt-App auf dem Desktop einmal pushen (☁️-Button).");
  log("Falls 401: Auth-Token in Settings anpassen.");
  log("Falls 500: Netlify-Function-Logs prüfen (möglicherweise package.json mit @netlify/blobs fehlt).");
};

$("cardArea").addEventListener("click", () => {
  if ($("reviewScreen").style.display !== "none" && !state.answerRevealed) {
    revealAnswer();
  }
});

$("rateButtons").addEventListener("click", (e) => {
  const btn = e.target.closest(".rate-btn");
  if (!btn) return;
  const rating = btn.dataset.rating;
  if (rating) rateCard(rating);
});

$("reviewBackBtn").addEventListener("click", () => {
  if (state.pendingReviews.length > 0) {
    if (confirm(`Du hast ${state.pendingReviews.length} ungesendete Reviews. Vor dem Verlassen hochladen?`)) {
      endReview(true);
      return;
    }
  }
  endReview(false);
});

$("btnCloseSettings").addEventListener("click", closeSettings);
$("settingsSheet").addEventListener("click", (e) => {
  if (e.target === $("settingsSheet")) closeSettings();
});

$("btnForceSync").addEventListener("click", async () => {
  $("settingsSheet").classList.remove("open");
  await forceSync();
});

$("btnPushNow").addEventListener("click", async () => {
  $("settingsSheet").classList.remove("open");
  await push();
  renderMain();
});

$("btnPullNow").addEventListener("click", async () => {
  if (state.pendingReviews.length > 0) {
    if (!confirm(`Du hast ${state.pendingReviews.length} ungesendete Reviews. Beim Pull werden lokale Pending-Reviews bewahrt — fortfahren?`)) return;
  }
  $("settingsSheet").classList.remove("open");
  await pull();
  renderMain();
});

$("btnReconfig").addEventListener("click", () => {
  $("settingsSheet").classList.remove("open");
  renderAuthTokenPrompt();
});

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden" && state.pendingReviews.length > 0) {
    saveLocal();
    push({ silent: true }).catch(() => {});
  }
});

window.addEventListener("beforeunload", () => { saveLocal(); });

async function init() {
  loadConfig();
  loadLocal();
  const needsPull = !state.rl 
    || !state.meta.lastPullAt 
    || (Date.now() - new Date(state.meta.lastPullAt).getTime() > 5 * 60 * 1000);
  if (needsPull) {
    await pull({ silent: false });
  } else {
    updateSyncChip("ok", "Synchron");
  }
  setLoading(false);
  renderMain();
}

init();
</script>
